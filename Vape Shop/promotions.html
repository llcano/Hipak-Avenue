<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions | Hipak Avenue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top border-bottom">
        <div class="container-fluid px-4 d-flex">
            
            <div class="d-flex align-items-center">
                <a class="navbar-brand" href="index.html">
                    <img src="images/business-logo.jpg" class="main-logo" alt="Logo">
                </a>
                <div class="navbar-nav d-flex flex-row gap-3">
                    <a class="nav-link fw-bold" href="index.html">Home</a>
                    <a class="nav-link fw-bold" href="products.html">Products</a>
                    <a class="nav-link fw-bold active text-dark" href="promotions.html">Promotions</a>
                </div>
            </div>

            <div class="search-container">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search...">
                    <button class="btn btn-dark" id="searchBtn">Go</button>
                </div>
            </div>

            <div class="nav-utility">
                <a class="nav-link fw-bold d-none d-md-block" href="contact.html">Contact Us</a>
                <a class="nav-link fw-bold d-none d-md-block" href="about.html">About Us</a>
                
                <div class="cart-icon-container" onclick="openCart()" role="button">
                    <span class="cart-emoji">🛒</span>
                    <span id="cart-count" class="cart-notification-badge badge rounded-pill bg-danger">0</span>
                </div>

                <select class="form-select form-select-sm" id="langSwitch" onchange="updateLanguage()">
                    <option value="en">English</option>
                    <option value="tl">Tagalog</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="container py-5 text-center">
        <h2 class="fw-bold mb-4" id="promoHeader">Promotions</h2>
        <div class="alert alert-secondary py-5 shadow-sm" style="border-radius: 20px; border: none; background: #fff;">
            <h4 class="fw-bold text-dark" id="promoBanner">Oops, you missed it.</h4>
            <p class="text-secondary mb-0" id="promoDetails">Stay tuned for our upcoming promotions.</p>
        </div>
    </div>

    <div id="cartSidebar" class="cart-sidebar shadow">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h4 class="fw-bold mb-0">My Cart</h4>
            <button class="btn-close" onclick="closeCart()"></button>
        </div>
        <div id="cart-items"></div>
        <div id="cart-summary" class="mt-auto border-top pt-3"></div>
        <div class="d-grid gap-2 mt-3">
            <button class="btn btn-dark" id="checkoutBtn" onclick="proceedToCheckout()">Checkout</button>
            <button class="btn btn-outline-danger btn-sm" id="clearCartBtn" onclick="clearCart()">Clear Cart</button>
        </div>
    </div>

<div class="modal fade" id="checkoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 border-0 shadow-lg">
            <h4 class="fw-bold mb-4">Checkout</h4>
            
            <input type="text" id="custName" class="form-control mb-3" placeholder="Full Name">
            <input type="text" id="custPhone" class="form-control mb-3" placeholder="Phone (09xxxxxxxxx)">
            
            <label class="fw-bold small text-uppercase mb-2 d-block text-muted">Service Option:</label>
            <div class="d-flex gap-2 mb-3">
                <input type="radio" class="btn-check" name="serviceOption" id="optDelivery" value="delivery" checked onchange="toggleCheckoutFields()">
                <label class="btn btn-outline-dark w-50 py-2" for="optDelivery">🚚 Delivery</label>

                <input type="radio" class="btn-check" name="serviceOption" id="optPickup" value="pickup" onchange="toggleCheckoutFields()">
                <label class="btn btn-outline-dark w-50 py-2" for="optPickup">🏪 Pickup</label>
            </div>

            <div id="addressSection">
                <textarea id="custAddress" class="form-control mb-3" placeholder="Complete Delivery Address" rows="2"></textarea>
            </div>

            <div id="pickupSection" class="alert alert-secondary d-none mb-3 py-2 small">
                <strong>Pickup Location:</strong> 5 Maria St., Villa Susana, Pasig
            </div>

            <label class="fw-bold small text-uppercase mb-2 d-block text-muted">Payment Method:</label>
            <select id="paymentMethod" class="form-select mb-3" onchange="toggleCheckoutFields()">
                <option value="COD">Cash on Delivery</option>
                <option value="Gcash">Gcash</option>
            </select>

            <div id="gcashInstructions" class="alert alert-primary d-none mb-3">
                <p class="mb-0 small" id="gcashMsgText"></p>
                <h5 class="fw-bold mb-0">₱<span id="gcashAmount"></span></h5>
            </div>

            <button class="btn btn-dark w-100 py-3 fw-bold mt-2" onclick="validateAndPlaceOrder()">Place Order</button>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
